<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control Financiero</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F13;--surface:#16161E;--surface2:#1E1E28;
  --border:#1F1F2C;--border2:#2A2A38;
  --text:#E8E6F0;--muted:#9090A8;--dim:#5A5A72;
  --accent:#7C3AED;--accent2:#A855F7;
  --green:#10B981;--green2:#059669;
  --red:#F43F5E;--red2:#E11D48;
  --blue:#3B82F6;--blue2:#2563EB;
  --gold:#F59E0B;--gold2:#D97706;
  --orange:#F97316;--orange2:#EA6C0A;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:#3A3A4A;border-radius:4px}
.header{background:linear-gradient(135deg,#12121A,#1A1020);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:50}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}
.header-title{font-size:18px;font-weight:700;color:#F0EEF8}
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:12px;padding:4px;border:1px solid var(--border)}
.tab{padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;font-family:inherit;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.container{max-width:720px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:18px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:9px 18px;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-primary:hover{opacity:.85}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border:none;padding:9px 18px;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:7px 12px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:#5A5A7A;color:var(--text)}
.btn-icon{background:transparent;border:none;cursor:pointer;font-size:15px;opacity:.4;transition:opacity .2s;padding:3px}
.btn-icon:hover{opacity:1}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 18px}
.month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px}
.month-name{font-weight:700;font-size:16px;color:#F0EEF8;text-align:center}
.month-year{font-size:12px;color:var(--dim);text-align:center;margin-top:1px}
.summary-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.summary-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.summary-card{border-radius:14px;padding:16px}
.summary-card.purple{background:linear-gradient(135deg,#1D0E38,#2D1060);border:1px solid #3D1880}
.summary-card.green{background:linear-gradient(135deg,#062318,#0A3020);border:1px solid #0D4030}
.summary-card.blue{background:linear-gradient(135deg,#0A1830,#102045);border:1px solid #1A3060}
.summary-card.gold{background:linear-gradient(135deg,#1E1408,#2A1C0A);border:1px solid #3A2810}
.summary-card.orange{background:linear-gradient(135deg,#1E0E04,#2A1508);border:1px solid #3A2010}
.summary-card.neutral{background:var(--surface);border:1px solid var(--border)}
.s-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.s-amount{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.1}
.s-sub{font-size:11px;margin-top:3px}
.cat-row{margin-bottom:10px}.cat-row:last-child{margin-bottom:0}
.cat-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cat-bar-bg{background:var(--surface2);border-radius:3px;height:5px}
.cat-bar{height:5px;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);transition:all .2s;font-family:inherit}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.expense-list{display:flex;flex-direction:column;gap:7px}
.expense-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:12px;background:var(--surface);border:1px solid var(--border);transition:border-color .2s;animation:fadeUp .3s ease both}
.expense-row:hover{border-color:var(--border2)}
.expense-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.expense-desc{font-weight:600;font-size:14px;color:#E8E6F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.expense-meta{font-size:11px;color:var(--dim);margin-top:2px}
.expense-amount{font-family:'DM Mono',monospace;font-weight:700;font-size:14px;flex-shrink:0}
.amount-gasto{color:#F0EEF8}.amount-ingreso{color:var(--green)}.amount-retiro{color:var(--red)}.amount-deposito{color:var(--green)}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-left:4px}
.badge-ingreso{background:#10B98120;color:var(--green)}.badge-gasto{background:#F43F5E18;color:var(--red)}
.badge-deposito{background:#10B98120;color:var(--green)}.badge-retiro{background:#F43F5E18;color:var(--red)}
.empty{text-align:center;padding:40px 20px;color:#3A3A52}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:600;color:#4A4A62}
.empty-sub{font-size:12px;margin-top:3px}
.actions-bar{display:flex;gap:8px;justify-content:flex-end}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(6px)}
.modal{background:#16161E;border:1px solid var(--border2);border-radius:20px;padding:26px;width:100%;max-width:420px;animation:fadeUp .25s ease;max-height:90vh;overflow-y:auto}
.modal-title{font-weight:700;font-size:17px;color:#F0EEF8;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.field input,.field select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 13px;border-radius:10px;font-family:inherit;font-size:14px;transition:border-color .2s;width:100%}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field select option{background:var(--surface2)}
.tipo-toggle{display:flex;gap:8px}
.tipo-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.tipo-btn.selected-ingreso{background:#10B98120;border-color:var(--green);color:var(--green)}
.tipo-btn.selected-gasto{background:#F43F5E18;border-color:var(--red);color:var(--red)}
.tipo-btn.selected-deposito{background:#10B98120;border-color:var(--green);color:var(--green)}
.tipo-btn.selected-retiro{background:#F43F5E18;border-color:var(--red);color:var(--red)}
.modal-footer{display:flex;gap:10px;margin-top:6px}
.modal-footer .btn-ghost{flex:1}.modal-footer .btn-primary{flex:2}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E2830;border:1px solid #2A4040;color:#7FFFB8;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;animation:fadeUp .3s ease;pointer-events:none}
.pago-tc-banner{background:linear-gradient(135deg,#0A1E10,#0F2A18);border:1px solid #1A4A28;border-radius:12px;padding:14px 16px;margin-bottom:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:520px){.summary-grid-3{grid-template-columns:1fr 1fr}.s-amount{font-size:16px}.tab{padding:6px 10px;font-size:12px}.tabs{gap:2px}}
@media(max-width:380px){.summary-grid-3{grid-template-columns:1fr}.tabs{gap:1px}.tab{padding:5px 8px;font-size:11px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div><div class="header-label">💰 Finanzas</div><div class="header-title">Control Financiero</div></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="userInfo" style="display:none;align-items:center;gap:8px">
        <img id="userAvatar" src="" alt="" style="width:30px;height:30px;border-radius:50%;border:2px solid var(--accent);object-fit:cover"/>
        <button class="btn-ghost" onclick="logout()" style="padding:5px 10px;font-size:12px">Salir</button>
      </div>
      <button id="btnAgregar" class="btn-primary" onclick="abrirModal()" style="display:none">+ Agregar</button>
    </div>
  </div>
</div>
<div style="background:#12121A;border-bottom:1px solid var(--border);padding:10px 20px">
  <div style="max-width:720px;margin:0 auto">
    <div class="tabs">
      <button class="tab active" onclick="setTab('resumen')">📊 Resumen</button>
      <button class="tab" onclick="setTab('tc')">💳 TC</button>
      <button class="tab" onclick="setTab('cc')">🏦 Cta. Corriente</button>
      <button class="tab" onclick="setTab('ahorros')">💎 Ahorros</button>
      <button class="tab" onclick="setTab('creditos')">🏛️ Créditos</button>
    </div>
  </div>
</div>
<div class="container">
  <div class="month-nav" id="monthNav">
    <button class="btn-ghost" onclick="cambiarMes(-1)">← Anterior</button>
    <div><div class="month-name" id="mesNombre"></div><div class="month-year" id="anioNum"></div></div>
    <button class="btn-ghost" onclick="cambiarMes(1)">Siguiente →</button>
  </div>
  <div id="viewResumen"></div>
  <div id="viewTC" style="display:none"></div>
  <div id="viewCC" style="display:none"></div>
  <div id="viewAhorros" style="display:none"></div>
  <div id="viewCreditos" style="display:none"></div>
</div>
<!-- Login overlay -->
<div class="overlay" id="loginOverlay" style="display:flex">
  <div class="modal" style="text-align:center;max-width:340px;padding:36px 28px">
    <div style="font-size:48px;margin-bottom:16px">💰</div>
    <div style="font-weight:700;font-size:20px;color:#F0EEF8;margin-bottom:8px">Control Financiero</div>
    <div style="color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.5">Inicia sesión para sincronizar tus datos entre PC y teléfono</div>
    <button onclick="loginConGoogle()" id="btnGoogle" style="width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--surface2);color:#F0EEF8;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s" onmouseover="this.style.background='#2A2A3A'" onmouseout="this.style.background='var(--surface2)'">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continuar con Google
    </button>
    <div id="loginError" style="margin-top:14px;color:var(--red);font-size:13px;display:none"></div>
  </div>
</div>
<!-- Modal -->
<div class="overlay" id="modalOverlay" style="display:none" onclick="cerrarSiAfuera(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitulo">Nueva transacción</div>
    <div class="field" id="fieldCuenta" style="display:none">
      <label>Cuenta</label>
      <select id="fCuenta" onchange="actualizarModalPorCuenta()">
        <option value="tc">💳 Tarjeta de Crédito</option>
        <option value="cc">🏦 Cuenta Corriente</option>
        <option value="ahorros">💎 Ahorros</option>
        <option value="creditos">🏛️ Créditos</option>
      </select>
    </div>
    <div class="field" id="fieldTipo" style="display:none">
      <label id="labelTipo">Tipo</label>
      <div class="tipo-toggle" id="tipoToggle"></div>
    </div>
    <div class="field"><label>Descripción</label><input id="fDesc" placeholder="Ej. Nómina, Supermercado…"/></div>
    <div class="field" id="fieldUF" style="display:none">
      <label>Monto en UF</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="fMontoUF" type="number" placeholder="0.00" min="0" step="0.01" oninput="convertirUFaCLP()" style="flex:1"/>
        <div style="font-size:12px;color:var(--muted);white-space:nowrap">× <span id="valorUFLabel" style="color:#93C5FD;font-weight:700">…</span></div>
      </div>
      <div id="ufPreviewCLP" style="font-size:12px;color:var(--dim);margin-top:4px;text-align:right"></div>
    </div>
    <div class="field"><label id="labelMonto">Monto (CLP)</label>
      <input id="fMonto" type="text" placeholder="0" oninput="formatearMonto(this);actualizarPreviewCuotas();calcularCuotaMensual()"/>
    </div>
    <!-- Banner Pago TC -->
    <div id="pagoTCBanner" style="display:none" class="pago-tc-banner">
      <div style="font-size:10px;color:#6EE7B7;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">💳 Detalle del pago TC</div>
      <div id="pagoTCDetalle"></div>
    </div>
    <div class="field" id="fieldCat">
      <label>Categoría</label>
      <select id="fCat" onchange="onCatChange()">
        <option value="cuotas_personales">💳 Cuotas Personales</option>
        <option value="cuotas_depto">🏠 Cuotas Depto</option>
        <option value="dividendo_depto">🏦 Dividendo Depto</option>
        <option value="gastos_comunes_depto">🔧 Gastos Comunes Depto</option>
        <option value="gastos_comunes_oficina">🏢 Gastos Comunes Oficina</option>
        <option value="varios_gonzalo">🧾 Varios Gonzalo</option>
        <option value="gastos_varios">📦 Gastos Varios</option>
        <option value="salidas">🍽️ Salidas</option>
        <option value="mercaderia">🛒 Mercadería</option>
        <option value="plataformas">📱 Plataformas Digitales</option>
        <option value="combustible">⛽ Combustible</option>
        <option value="uber">🚗 Uber</option>
        <option value="almuerzo_trabajo">🥗 Almuerzo Trabajo</option>
        <option value="deporte">🏋️ Deporte</option>
        <option value="extras_oficina">🏢 Extras Oficina</option>
        <option value="reembolsables">↩️ Reembolsables</option>
        <option value="seguros">🛡️ Seguros</option>
        <option value="salud_gonzalo">🏥 Salud Gonzalo</option>
        <option value="gastos_depto">🏡 Gastos Depto</option>
        <option value="farmacia">💊 Farmacia</option>
        <option value="pago">💸 Pago</option>
        <option value="pago_tc">💳 Pago TC</option>
        <option value="javi">👤 Javi</option>
        <option value="chancheo">🐷 Chancheo</option>
        <option value="chancheo_salida">🐷 Chancheo Salida</option>
        <option value="cafe">☕ Café</option>
        <option value="skin_lux">💆‍♀️ Skin Lux</option>
        <option value="credito_consumo">💼 Crédito Consumo</option>
        <option value="credito_hipotecario">🏠 Crédito Hipotecario</option>
        <option value="arriendo_oficina">🏢 Arriendo Oficina</option>
      </select>
    </div>
    <!-- Picker mes TC a pagar -->
    <div class="field" id="fieldMesPagoTC" style="display:none">
      <label>Mes TC a pagar</label>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
        <button type="button" onclick="cambiarAnioMesPagoTC(-1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:14px;cursor:pointer">←</button>
        <span id="mesPagoTCLabel" style="font-weight:700;color:#F0EEF8;font-size:15px"></span>
        <button type="button" onclick="cambiarAnioMesPagoTC(1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:14px;cursor:pointer">→</button>
      </div>
      <div id="mesPagoTCGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px"></div>
      <button type="button" onclick="calcularTotalTCMes()" style="margin-top:10px;width:100%;padding:9px;border-radius:10px;background:linear-gradient(135deg,#0A1E10,#0F2A18);border:1px solid #1A4A28;color:#6EE7B7;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">🔄 Calcular total TC del mes</button>
    </div>
    <div class="field" id="fieldFecha"><label id="labelFecha">Fecha de compra</label><input id="fFecha" type="date"/></div>
    <div class="field" id="fieldMesFac" style="display:none">
      <label>Mes de facturación</label>
      <input id="fMesFac" type="hidden"/>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
        <button type="button" onclick="cambiarAnioMesFac(-1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:14px;cursor:pointer">←</button>
        <span id="mesFacAnioLabel" style="font-weight:700;color:#F0EEF8;font-size:15px"></span>
        <button type="button" onclick="cambiarAnioMesFac(1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:14px;cursor:pointer">→</button>
      </div>
      <div id="mesFacGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px"></div>
    </div>
    <div class="field" id="fieldCuotas" style="display:none">
      <label>Número de cuotas</label>
      <div style="display:flex;gap:8px;align-items:center">
        <button type="button" onclick="ajustarCuotas(-1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;font-family:inherit">−</button>
        <div style="flex:1;text-align:center">
          <span id="cuotasNum" style="font-size:22px;font-weight:700;color:#F0EEF8;font-family:'DM Mono',monospace">1</span>
          <span style="font-size:13px;color:var(--muted);margin-left:4px">cuota(s)</span>
        </div>
        <button type="button" onclick="ajustarCuotas(1)" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;font-family:inherit">+</button>
      </div>
      <div id="cuotasPreview" style="margin-top:8px;font-size:12px;color:var(--dim);text-align:center"></div>
    </div>
    <div class="field" id="fieldCuotasCredito" style="display:none">
      <label>Cuotas del crédito</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>

function renderTC(){

  const total=gm.reduce((s,t)=>t.cat==="pago"?s-t.monto:s+t.monto,0);
  const porCat=Object.keys(CATS).filter(id=>!CATS_CREDITOS.includes(id)&&id!=="pago_tc").map(id=>{
    const items=gm.filter(t=>t.cat===id).sort((a,b)=>b.monto-a.monto);
    const rawTotal=items.reduce((s,t)=>s+t.monto,0);
    const catTotal=id==="pago"?-rawTotal:rawTotal;
    return{id,...CATS[id],total:catTotal,rawTotal,items};

    return c.rawTotal>0;
  }).sort((a,b)=>{
    if(filtroPersonaTC==='javi'){const ja=a.items.reduce((s,t)=>s+(t.monto_javi||0),0);const jb=b.items.reduce((s,t)=>s+(t.monto_javi||0),0);return jb-ja;}

    const ba=a.items.reduce((s,t)=>s+(t.monto_total||t.monto),0);const bb=b.items.reduce((s,t)=>s+(t.monto_total||t.monto),0);return bb-ba;
  });
  const totalFacturado=gm.filter(t=>t.cat!=='pago').reduce((s,t)=>s+(t.monto_total||t.monto),0);
  const totalPagos=gm.filter(t=>t.cat==='pago').reduce((s,t)=>s+(t.monto_total||t.monto),0);
  const saldoPendiente=totalFacturado-totalPagos;
  const totalJavi=gm.reduce((s,t)=>s+(t.monto_javi||0),0);
  let html=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="summary-card neutral" onclick="setFiltroPersonaTC('todas')" style="cursor:pointer;${filtroPersonaTC==='todas'?'outline:2px solid #A78BFA;outline-offset:2px':'opacity:.65'}"><div class="s-label" style="color:var(--muted)">Total facturado</div><div class="s-amount" style="color:#F0EEF8;font-size:17px">${mxn(totalFacturado)}</div><div class="s-sub" style="color:var(--dim)">${gm.length} movimientos</div></div>
      <div class="summary-card purple" onclick="setFiltroPersonaTC('gonzalo')" style="cursor:pointer;${filtroPersonaTC==='gonzalo'?'outline:2px solid #A78BFA;outline-offset:2px':'opacity:.65'}"><div class="s-label" style="color:#A78BFA">Gonzalo</div><div class="s-amount" style="color:#F0EEF8;font-size:17px">${mxn(total)}</div><div class="s-sub" style="color:#7060A0">${totalFacturado>0?(total/totalFacturado*100).toFixed(0):'0'}% del total</div></div>
      <div class="summary-card neutral" onclick="setFiltroPersonaTC('javi')" style="cursor:pointer;border-color:#64748B40;${filtroPersonaTC==='javi'?'outline:2px solid #94A3B8;outline-offset:2px':'opacity:.65'}"><div class="s-label" style="color:#94A3B8">Javi</div><div class="s-amount" style="color:#94A3B8;font-size:17px">${mxn(totalJavi)}</div><div class="s-sub" style="color:#475569">${totalFacturado>0?(totalJavi/totalFacturado*100).toFixed(0):'0'}% del total</div></div>
    </div>
    ${totalFacturado>0?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div><div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Total facturado</div><div style="font-family:'DM Mono',monospace;font-weight:700;font-size:15px;color:#F0EEF8">${mxn(totalFacturado)}</div></div><div><div style="font-size:10px;color:#6EE7B7;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Pagos realizados</div><div style="font-family:'DM Mono',monospace;font-weight:700;font-size:15px;color:#6EE7B7">${mxn(totalPagos)}</div></div><div><div style="font-size:10px;color:${saldoPendiente>0?'#F87171':'#6EE7B7'};font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Saldo pendiente</div><div style="font-family:'DM Mono',monospace;font-weight:700;font-size:15px;color:${saldoPendiente>0?'#F87171':'#6EE7B7'}">${mxn(saldoPendiente)}</div></div></div><div style="background:var(--surface2);border-radius:6px;height:6px;overflow:hidden"><div style="height:6px;border-radius:6px;background:linear-gradient(90deg,var(--green),#059669);width:${totalFacturado>0?Math.min(totalPagos/totalFacturado*100,100).toFixed(1):0}%;transition:width .6s ease"></div></div>`:''}
    <div style="display:flex;gap:6px">
      <button onclick="setVistaTC('categorias')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ${vistaTC==='categorias'?'var(--accent)':'var(--border2)'};background:${vistaTC==='categorias'?'#3D1880':'var(--surface2)'};color:${vistaTC==='categorias'?'#fff':'var(--muted)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">📊 Por categoría</button>
      <button onclick="setVistaTC('lista')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ${vistaTC==='lista'?'var(--accent)':'var(--border2)'};background:${vistaTC==='lista'?'#3D1880':'var(--surface2)'};color:${vistaTC==='lista'?'#fff':'var(--muted)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">📋 Lista completa</button>
    </div>`;
  if(!porCat.length){html+=emptyState("💳","Sin gastos este mes","Agrega tu primer gasto con el botón de arriba");document.getElementById("viewTC").innerHTML=html;return;}
  if(vistaTC==="categorias"){
    html+=porCat.map(c=>{
      const abierta=catExpandida===c.id;
      const totalJaviCat=c.items.reduce((s,t)=>s+(t.monto_javi||0),0);
      const totalBruto=c.items.reduce((s,t)=>s+(t.monto_total||t.monto),0);
      const montoVisible=filtroPersonaTC==='javi'?totalJaviCat:filtroPersonaTC==='gonzalo'?c.total:totalBruto;
      const baseTotal=filtroPersonaTC==='javi'?totalJavi:filtroPersonaTC==='gonzalo'?total:totalFacturado;
      const pct=(baseTotal!==0?Math.abs(montoVisible)/Math.abs(baseTotal)*100:0).toFixed(1);
      const badgeRegla=c.regla==="gonzalo"?`<span style="background:#8B5CF620;border:1px solid #8B5CF660;color:#C4B5FD;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">100% Gonzalo</span>`:c.regla==="javi"?`<span style="background:#64748B20;border:1px solid #64748B60;color:#94A3B8;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">100% Javi</span>`:c.regla==="50_50"?`<span style="background:#3B82F620;border:1px solid #3B82F660;color:#93C5FD;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">50% · 50%</span>`:`<span style="background:#10B98120;border:1px solid #10B98160;color:#6EE7B7;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">60% G · 40% J</span>`;
      const badgePago=c.id==="pago"?`<span style="background:#10B98120;border:1px solid #10B98160;color:#6EE7B7;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">↓ Resta de Gonzalo</span>`:'';
      const montoColor=(c.id==="pago"&&filtroPersonaTC!=='javi')?'#6EE7B7':'#F0EEF8';
      return`<div style="background:var(--surface);border:1px solid ${abierta?c.color+'60':'var(--border)'};border-radius:14px;overflow:hidden;transition:border-color .2s">
        <div onclick="toggleCat('${c.id}')" style="display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer">
          <div style="width:36px;height:36px;border-radius:9px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${c.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px"><span style="font-weight:700;font-size:14px;color:#F0EEF8">${c.label}</span>${badgeRegla}${badgePago}</div>
            <div style="background:var(--surface2);border-radius:3px;height:4px;width:100%;margin-top:4px"><div style="height:4px;border-radius:3px;width:${Math.min(parseFloat(pct),100)}%;background:${c.id==='pago'?'#10B981':c.color};box-shadow:0 0 6px ${c.id==='pago'?'#10B98160':c.color+'60'}"></div></div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px"><div style="font-family:'DM Mono',monospace;font-weight:700;font-size:15px;color:${montoColor}">${mxn(montoVisible)}</div><div style="font-size:11px;color:${c.id==='pago'?'#10B981':c.color};font-weight:600">${pct}% · ${c.items.length} mov.</div></div>
          <div style="color:var(--dim);font-size:12px;margin-left:4px">${abierta?'▲':'▼'}</div>
        </div>
        ${abierta?`<div style="border-top:1px solid var(--border2);background:var(--surface2)">
          <div style="padding:10px 14px 8px;display:grid;grid-template-columns:1fr 1fr${totalJaviCat>0?' 1fr':''};gap:8px;border-bottom:1px solid var(--border)">
            <div style="background:var(--surface);border-radius:9px;padding:8px 10px;border:1px solid ${c.id==='pago'?'#10B98130':'#8B5CF630'}"><div style="font-size:10px;color:${c.id==='pago'?'#6EE7B7':'#C4B5FD'};font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px">Gonzalo</div><div style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:${c.id==='pago'?'#6EE7B7':'#F0EEF8'}">${mxn(c.total)}</div></div>
            ${totalJaviCat>0?`<div style="background:var(--surface);border-radius:9px;padding:8px 10px;border:1px solid #64748B30"><div style="font-size:10px;color:#94A3B8;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px">Javi</div><div style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:#F0EEF8">${mxn(totalJaviCat)}</div></div>`:''}
            ${totalBruto>c.rawTotal?`<div style="background:var(--surface);border-radius:9px;padding:8px 10px;border:1px solid var(--border2)"><div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px">Total bruto</div><div style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:var(--muted)">${mxn(totalBruto)}</div></div>`:''}
          </div>
          <div style="padding:10px 12px;display:flex;flex-direction:column;gap:5px">
            ${c.items.map(t=>{
              const fecha=fechaLocal(t.fecha).toLocaleDateString("es-CL",{day:"numeric",month:"short"});
              const tieneJavi=(t.monto_javi||0)>0;
              return`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;background:var(--surface);border:1px solid var(--border)">
                <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#E8E6F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.desc)}</div>
                <div style="font-size:11px;color:var(--dim);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap"><span>${fecha}</span>${tieneJavi?`<span style="color:#C4B5FD">G: ${mxn(t.monto)}</span><span style="color:#94A3B8">J: ${mxn(t.monto_javi)}</span><span style="color:var(--dim)">Total: ${mxn(t.monto_total||t.monto+t.monto_javi)}</span>`:''}</div></div>
                <div style="font-family:'DM Mono',monospace;font-weight:700;font-size:13px;color:#F0EEF8;flex-shrink:0">${mxn(t.monto)}</div>
                <button class="btn-icon" onclick="event.stopPropagation();abrirModal('${t.id}')" title="Editar">✏️</button>
                <button class="btn-icon" onclick="event.stopPropagation();eliminar('${t.id}')" title="Eliminar">🗑️</button>
              </div>`;
            }).join("")}
          </div>
        </div>`:''}
      </div>`;
    }).join("");
  }
  if(vistaTC==="lista"){
    html+=`<div class="chips"><button class="chip ${filtroTC==="todas"?"active":""}" onclick="setFiltroTC('todas')">Todas</button>${porCat.map(c=>`<button class="chip ${filtroTC===c.id?"active":""}" onclick="setFiltroTC('${c.id}')" style="${filtroTC===c.id?`background:${c.color}22;border-color:${c.color};color:${c.color}`:""}">${c.icon} ${c.label}</button>`).join("")}</div>`;
    const filtrados=(filtroTC==="todas"?gm:gm.filter(t=>t.cat===filtroTC)).sort((a,b)=>b.fecha.localeCompare(a.fecha));
    html+=`<div class="expense-list">${filtrados.map((t,i)=>filaTransaccionTC(t,i)).join("")}</div>`;
  }
  document.getElementById("viewTC").innerHTML=html;
}
function setVistaTC(v){vistaTC=v;catExpandida=null;renderTC();}
function toggleCat(id){catExpandida=catExpandida===id?null:id;renderTC();}

/* CC */

  const filtrados=(filtroCC==="todas"?gm:filtroCC==="ingresos"?gm.filter(t=>t.tipo==="ingreso"):filtroCC==="gastos"?gm.filter(t=>t.tipo==="gasto"):gm.filter(t=>t.cat===filtroCC&&t.tipo==="gasto")).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  let html=`
    <div style="background:${saldoAcumulado>=0?'linear-gradient(135deg,#062318,#0A3020)':'linear-gradient(135deg,#200A0C,#2A0F12)'};border:1px solid ${saldoAcumulado>=0?'#0D4030':'#4A1020'};border-radius:16px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div><div style="font-size:10px;color:${saldoAcumulado>=0?'#6EE7B7':'#F87171'};font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px">Saldo actual</div><div style="font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:${saldoAcumulado>=0?'#6EE7B7':'#F87171'}">${mxn(saldoAcumulado)}</div><div style="font-size:11px;color:${saldoAcumulado>=0?'#34794A':'#7A3040'};margin-top:3px">Acumulado hasta ${MESES[mes]} ${anio}</div></div>
      <div style="font-size:36px;opacity:.4">${saldoAcumulado>=0?'🏦':'⚠️'}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div style="background:linear-gradient(135deg,#062318,#0A3020);border:1px solid #0D4030;border-radius:12px;padding:14px"><div style="font-size:10px;color:#6EE7B7;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Ingresos</div><div style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:#6EE7B7">${mxn(ingresos)}</div></div>
      <div style="background:linear-gradient(135deg,#200A0C,#2A0F12);border:1px solid #4A1020;border-radius:12px;padding:14px"><div style="font-size:10px;color:#F87171;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Gastos</div><div style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:#F87171">${mxn(gastos)}</div></div>
      <div style="background:${balance>=0?'linear-gradient(135deg,#062318,#0A3020)':'linear-gradient(135deg,#200A0C,#2A0F12)'};border:1px solid ${balance>=0?'#0D4030':'#4A1020'};border-radius:12px;padding:14px"><div style="font-size:10px;color:${balance>=0?'#6EE7B7':'#F87171'};font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Mes</div><div style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:${balance>=0?'#6EE7B7':'#F87171'}">${mxn(balance)}</div></div>
    </div>`;
  if(porCat.length&&gastos>0){
    html+=`<div class="card"><div class="section-label" style="margin-bottom:14px">Gastos por categoría</div>${porCat.map(c=>`<div class="cat-row"><div class="cat-meta"><span>${c.icon} ${c.label}</span><span style="font-family:'DM Mono',monospace;font-weight:600;color:#C0B8D8">${mxn(c.total)}</span></div><div class="cat-bar-bg"><div class="cat-bar" style="width:${(c.total/gastos*100).toFixed(1)}%;background:${c.color};box-shadow:0 0 8px ${c.color}60"></div></div></div>`).join("")}</div>`;
  }
  const catChips=porCat.map(c=>`<button class="chip ${filtroCC===c.id?"active":""}" onclick="setFiltroCC('${c.id}')" style="${filtroCC===c.id?`background:${c.color}22;border-color:${c.color};color:${c.color}`:""}">${c.icon} ${c.label}</button>`).join("");
  html+=`<div class="chips"><button class="chip ${filtroCC==="todas"?"active":""}" onclick="setFiltroCC('todas')">Todos</button><button class="chip ${filtroCC==="ingresos"?"active":""}" onclick="setFiltroCC('ingresos')" style="${filtroCC==="ingresos"?"background:#10B98120;border-color:var(--green);color:var(--green)":""}">✅ Ingresos</button><button class="chip ${filtroCC==="gastos"?"active":""}" onclick="setFiltroCC('gastos')" style="${filtroCC==="gastos"?"background:#F43F5E18;border-color:var(--red);color:var(--red)":""}">🔴 Gastos</button>${catChips}</div>`;

}

/* AHORROS */
function renderAhorros(){

  const saldo=hastaHoy.reduce((s,t)=>t.tipo==="deposito"?s+t.monto:s-t.monto,0);

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:linear-gradient(135deg,#062318,#0A3020);border:1px solid #0D4030;border-radius:12px;padding:14px"><div style="font-size:10px;color:#6EE7B7;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Depósitos del mes</div><div style="font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:#6EE7B7">+${mxn(depositos)}</div></div>
      <div style="background:linear-gradient(135deg,#200A0C,#2A0F12);border:1px solid #4A1020;border-radius:12px;padding:14px"><div style="font-size:10px;color:#F87171;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Retiros del mes</div><div style="font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:#F87171">-${mxn(retiros)}</div></div>

/* FILAS */
function filaTransaccion(t,i){
  const c=CATS[t.cat]||{icon:"📦",color:"#6B7280",label:"Otros"};
  const fecha=fechaLocal(t.fecha).toLocaleDateString("es-MX",{day:"numeric",month:"short"});
  let iconBg,icon,amountClass,signo,badge;
  if(t.cuenta==="tc"){iconBg=c.color+"22";icon=c.icon;amountClass="amount-gasto";signo="-";badge="";}
  else if(t.cuenta==="cc"){
    if(t.tipo==="ingreso"){iconBg="#10B98120";icon="💵";amountClass="amount-ingreso";signo="+";badge=`<span class="badge badge-ingreso">Ingreso</span>`;}
    else{iconBg=c.color+"22";icon=c.icon;amountClass="amount-gasto";signo="-";badge=`<span class="badge badge-gasto">Gasto</span>`;}
  }else if(t.cuenta==="creditos"){iconBg=c.color+"22";icon=c.icon;amountClass="amount-gasto";signo="-";badge="";}
  else{if(t.tipo==="deposito"){iconBg="#10B98120";icon="💰";amountClass="amount-deposito";signo="+";badge=`<span class="badge badge-deposito">Depósito</span>`;}else{iconBg="#F43F5E18";icon="💸";amountClass="amount-retiro";signo="-";badge=`<span class="badge badge-retiro">Retiro</span>`;}}
  const metaLabel=t.cuenta==="cc"&&t.tipo==="gasto"?`${c.label} · ${fecha}`:t.cuenta==="tc"?`${c.label} · ${fecha}`:t.cuenta==="creditos"?`${c.label} · ${fecha}`:fecha;
  const extraMeta=(t.cat==="pago_tc"&&t.tc_mes_pagado)?` · TC ${MESES_CORTOS[parseInt(t.tc_mes_pagado.slice(5,7))-1]} ${t.tc_mes_pagado.slice(0,4)}`:'';
  const montoMostrar=t.monto_total||t.monto;
  return`<div class="expense-row" style="animation-delay:${i*35}ms">
    <div class="expense-icon" style="background:${iconBg}">${icon}</div>
    <div style="flex:1;min-width:0">
      <div class="expense-desc">${esc(t.desc)}${badge}</div>
      <div class="expense-meta">${metaLabel}${extraMeta}</div>

    if(t.cuenta==="creditos")initMesFacPicker(t.mes_facturacion||t.fecha.slice(0,7));
    if(t.cuenta==="cc"&&t.cat==="pago_tc"&&t.tc_mes_pagado){
      const[y,m]=t.tc_mes_pagado.split('-').map(Number);
      mesPagoTCAnio=y;mesPagoTCMes=m-1;
      document.getElementById("fieldMesPagoTC").style.display="";

    }
  }else{
    document.getElementById("modalTitulo").textContent="Nueva transacción";

function calcularCuotaMensual(){
  const actual=parseInt(document.getElementById("fCuotaActual").value)||0;
  const total=parseInt(document.getElementById("fCuotasTotal").value)||0;
  const monto=leerMonto()||0;
  const preview=document.getElementById("cuotaCreditoPreview");if(!preview)return;
  let parts=[];
  if(actual>0&&total>0){const restantes=total-actual+1;const mesBase=`${mesFacAnio}-${String(mesFacMes+1).padStart(2,'0')}`;const ultimoMesFac=mesFacDeCuota(mesBase,restantes-1);const mesFinLabel=`${MESES_CORTOS[parseInt(ultimoMesFac.slice(5,7))-1]} ${ultimoMesFac.slice(0,4)}`;parts.push(`Cuota ${actual} de ${total}`);parts.push(`Se crearán ${restantes} cuotas hasta ${mesFinLabel}`);}
  if(monto>0)parts.push(`Monto por cuota: ${mxn(monto)}`);
  preview.textContent=parts.join(" · ");
}
function formatearMonto(input){const raw=input.value.replace(/\./g,'').replace(/[^0-9]/g,'');if(raw===''){input.value='';return;}input.value=parseInt(raw).toLocaleString('es-CL');}
function leerMonto(){const val=document.getElementById("fMonto").value.replace(/\./g,'').replace(/[^0-9]/g,'');return parseFloat(val)||0;}
function setTipo(t){modalTipo=t;const cuenta=document.getElementById("fCuenta").value;actualizarModalPorCuenta(cuenta);}
function cerrarModal(){document.getElementById("modalOverlay").style.display="none";}
function cerrarSiAfuera(e){if(e.target===document.getElementById("modalOverlay"))cerrarModal();}

/* GUARDAR */
async function guardar(){
  const desc=document.getElementById("fDesc").value.trim();
  const monto=leerMonto();
  const fecha=document.getElementById("fFecha").value;
  const cuenta=document.getElementById("fCuenta").value;
  const cat=document.getElementById("fCat").value;
  const mesFac=document.getElementById("fMesFac").value;

  /* ── CASO ESPECIAL: Pago TC en CC ── */
  if(cuenta==="cc"&&cat==="pago_tc"){
    if(!desc||!fecha){mostrarToast("⚠️ Completa todos los campos");return;}
    const mesStr=`${mesPagoTCAnio}-${String(mesPagoTCMes+1).padStart(2,'0')}`;
    const{totalGeneral,totalGonzalo,totalJavi}=calcularTotalTCDeMes(mesStr);
    if(totalGeneral===0){mostrarToast("⚠️ Primero calcula el total TC del mes");return;}
    cerrarModal();
    try{
      // Registro en CC (gasto)
      const transCC={fecha,cuenta:"cc",tipo:"gasto",cat:"pago_tc",desc,
        monto:totalGonzalo,monto_javi:totalJavi,monto_total:totalGeneral,tc_mes_pagado:mesStr};
      // Registro en TC (pago) — reduce saldo pendiente del mes TC
      const transTC={fecha,cuenta:"tc",tipo:"gasto",cat:"pago",desc,
        monto:totalGeneral,mes_facturacion:mesStr,pago_tc_ref:true};
      if(editandoId){
        // Actualizar CC
        await colUsuario().doc(editandoId).update(transCC);
        // Actualizar o crear espejo TC
        const tcEspejo=data.find(t=>t.cuenta==="tc"&&t.cat==="pago"&&t.pago_tc_cc_ref===editandoId);
        if(tcEspejo)await colUsuario().doc(tcEspejo.id).update({...transTC,pago_tc_cc_ref:editandoId});
        else await colUsuario().add({...transTC,pago_tc_cc_ref:editandoId});
        mostrarToast("✅ Pago TC actualizado");
      }else{
        const docCC=await colUsuario().add(transCC);
        await colUsuario().add({...transTC,pago_tc_cc_ref:docCC.id});
        mostrarToast(`✅ Pago TC: ${mxn(totalGeneral)} (G:${mxn(totalGonzalo)} / J:${mxn(totalJavi)})`);
      }
    }catch(err){mostrarToast("❌ Error: "+err.message);}
    return;
  }

  if(!desc||isNaN(monto)||monto<=0||!fecha){mostrarToast("⚠️ Completa todos los campos");return;}
  if((cuenta==="tc"||cuenta==="creditos")&&!mesFac){mostrarToast("⚠️ Selecciona el mes de facturación");return;}

  let monto_gonzalo=monto,monto_javi_calc=0,monto_total_calc=monto;
  if((cuenta==="tc"&&cat!=="pago")||cuenta==="creditos"){
    const regla=CATS[cat];
    if(regla){monto_total_calc=monto;monto_gonzalo=Math.round(monto*regla.pct_g);monto_javi_calc=Math.round(monto*regla.pct_j);}
  }
  const esPagoTC=(cuenta==="tc"&&cat==="pago");
  const cuotas=(cuenta==="tc"&&!esPagoTC&&numCuotas>1)?numCuotas:1;
  const montoCuota=Math.round(monto_total_calc/cuotas);
  const montoGonzaloCuota=Math.round(monto_gonzalo/cuotas);
  const montoJaviCuota=Math.round(monto_javi_calc/cuotas);
  const tranBase={fecha,cuenta,tipo:modalTipo,cat:(cuenta==="tc"||cuenta==="creditos"||(cuenta==="cc"&&modalTipo==="gasto"))?cat:null};

  cerrarModal();
  try{
    if(editandoId){
      const trans={...tranBase,desc,monto:monto_gonzalo,...((cuenta==="tc"||cuenta==="creditos")?{mes_facturacion:mesFac}:{}),...((cuenta==="tc"||cuenta==="creditos")&&monto_javi_calc>0?{monto_javi:monto_javi_calc,monto_total:monto_total_calc}:{})};
      await colUsuario().doc(editandoId).update(trans);
      if(esPagoTC){
        const ccEspejo=data.find(t=>t.cuenta==="cc"&&t.tc_pago_ref===editandoId);
        const transCC={desc:`Pago TC: ${desc}`,monto,fecha,cuenta:"cc",tipo:"gasto",cat:"pago",tc_pago_ref:editandoId};
        if(ccEspejo)await colUsuario().doc(ccEspejo.id).update(transCC);else await colUsuario().add(transCC);
      }else if(cuenta==="tc"){const ccEspejo=data.find(t=>t.cuenta==="cc"&&t.tc_pago_ref===editandoId);if(ccEspejo)await colUsuario().doc(ccEspejo.id).delete();}
      else if(cuenta==="ahorros"){
        const ccEspejo=data.find(t=>t.cuenta==="cc"&&t.ahorro_ref===editandoId);
        const tipoCC=modalTipo==="deposito"?"gasto":"ingreso";const descCC=modalTipo==="deposito"?`Depósito ahorro: ${desc}`:`Retiro ahorro: ${desc}`;
        const transCC={desc:descCC,monto,fecha,cuenta:"cc",tipo:tipoCC,cat:null,ahorro_ref:editandoId};
        if(ccEspejo)await colUsuario().doc(ccEspejo.id).update(transCC);else await colUsuario().add(transCC);
      }
      mostrarToast("✅ Transacción actualizada");
    }else{
      if(esPagoTC){
        const trans={...tranBase,desc,monto:monto_gonzalo,...(cuenta==="tc"?{mes_facturacion:mesFac}:{})};
        const docRef=await colUsuario().add(trans);
        await colUsuario().add({desc:`Pago TC: ${desc}`,monto,fecha,cuenta:"cc",tipo:"gasto",cat:"pago",tc_pago_ref:docRef.id});
        mostrarToast("✅ Pago registrado y descontado de CC");
      }else if(cuenta==="ahorros"){
        const trans={...tranBase,desc,monto};const docRef=await colUsuario().add(trans);
        const tipoCC=modalTipo==="deposito"?"gasto":"ingreso";
        const descCC=modalTipo==="deposito"?`Depósito ahorro: ${desc}`:`Retiro ahorro: ${desc}`;
        await colUsuario().add({desc:descCC,monto,fecha,cuenta:"cc",tipo:tipoCC,cat:null,ahorro_ref:docRef.id});
        mostrarToast(modalTipo==="deposito"?"✅ Depósito registrado y descontado de CC":"✅ Retiro registrado e ingresado a CC");
      }else if(cuotas>1){
        const lote=db.batch();

          await lote.commit();mostrarToast(`✅ ${cuotasRestantes} cuotas creadas (${mesInicioLabel} → ${mesFinLabel})`);
        }else{
          const trans={...tranBase,desc,monto:monto_gonzalo,...((cuenta==="tc"||cuenta==="creditos")?{mes_facturacion:mesFac}:{}),...((cuenta==="tc"||cuenta==="creditos")&&monto_javi_calc>0?{monto_javi:monto_javi_calc,monto_total:monto_total_calc}:{}),...(cuenta==="creditos"&&cat==="credito_hipotecario"&&montoUFval?{monto_uf:montoUFval,valor_uf:valorUF}:{}),...(cuenta==="creditos"&&cuotaActual?{cuota_actual:cuotaActual}:{}),...(cuenta==="creditos"&&cuotasTotal?{cuotas_total:cuotasTotal}:{})};
          await colUsuario().add(trans);mostrarToast("✅ Transacción agregada");
        }
      }
    }

}

/* EXPORT/IMPORT */
function exportarJSON(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`finanzas_${new Date().toISOString().slice(0,10)}.json`;a.click();
  mostrarToast("⬇️ Datos exportados");
}
function importarJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw new Error("No es un array");
      mostrarToast("⏳ Importando "+d.length+" movimientos…");
      const existentes=await colUsuario().get();const borrar=db.batch();existentes.docs.forEach(doc=>borrar.delete(doc.ref));await borrar.commit();
      for(let i=0;i<d.length;i+=499){const lote=db.batch();d.slice(i,i+499).forEach(item=>{const{id,...resto}=item;const ref=id?colUsuario().doc(String(id)):colUsuario().doc();lote.set(ref,resto);});await lote.commit();}
      mostrarToast("✅ Importados: "+d.length+" movimientos");
    }catch(err){mostrarToast("❌ Error: "+err.message);}
  };
  reader.readAsText(file);e.target.value="";
}

/* TOAST */
function mostrarToast(msg){
  clearTimeout(toastTimer);
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t);}
  t.textContent=msg;t.style.display="block";
  toastTimer=setTimeout(()=>{t.style.display="none";},2400);
}

/* UF */
async function cargarValorUF(){
  if(valorUF)return valorUF;
  try{const hoy=new Date();const dd=String(hoy.getDate()).padStart(2,'0');const mm=String(hoy.getMonth()+1).padStart(2,'0');const yyyy=hoy.getFullYear();const res=await fetch(`https://mindicador.cl/api/uf/${dd}-${mm}-${yyyy}`);const json=await res.json();valorUF=json.serie[0].valor;}
  catch(e){valorUF=38500;}
  return valorUF;
}
function mostrarCampoUF(mostrar){
  document.getElementById("fieldUF").style.display=mostrar?"":"none";
  document.getElementById("labelMonto").textContent=mostrar?"Monto (CLP, calculado)":"Monto (CLP)";
  if(!mostrar){document.getElementById("fMontoUF").value="";document.getElementById("ufPreviewCLP").textContent="";}
}
async function convertirUFaCLP(){
  const uf=parseFloat(document.getElementById("fMontoUF").value)||0;
  if(uf<=0){document.getElementById("fMonto").value="";document.getElementById("ufPreviewCLP").textContent="";return;}
  const vuf=await cargarValorUF();const clp=Math.round(uf*vuf);
  document.getElementById("fMonto").value=clp;
  document.getElementById("ufPreviewCLP").textContent=`${uf} UF × $${Math.round(vuf).toLocaleString('es-CL')} = ${mxn(clp)}`;
  actualizarPreviewCuotas();
}

  if(!gm.length)html+=emptyState("🏛️","Sin créditos este mes","Registra cuotas de consumo o hipotecarios");
  const tieneRegistros=data.filter(t=>t.cuenta==="creditos");
  html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px"><div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Gestión de créditos</div><div style="display:flex;flex-direction:column;gap:8px">${tieneRegistros.length>0?Object.entries(tieneRegistros.reduce((acc,t)=>{acc[t.cat||'sin_cat']=(acc[t.cat||'sin_cat']||0)+1;return acc;},{})).map(([catId,count])=>{const cat=CATS[catId]||{icon:"📦",label:catId};return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border2)"><span style="font-size:13px;color:var(--text)">${cat.icon} ${cat.label} <span style="color:var(--dim);font-size:12px">(${count} registros)</span></span><button onclick="eliminarTodasCuotas('${catId}')" style="background:#F43F5E18;border:1px solid #F43F5E40;color:#F87171;padding:5px 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer">🗑️ Eliminar</button></div>`;}).join(''):'<div style="color:var(--dim);font-size:13px">No hay registros</div>'}<button onclick="eliminarTodosCreditos()" style="background:#F43F5E30;border:1px solid #F43F5E80;color:#F87171;padding:10px 14px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px">🗑️ Eliminar TODOS los créditos ${tieneRegistros.length>0?'('+tieneRegistros.length+' registros)':''}</button></div></div>`;
  document.getElementById("viewCreditos").innerHTML=html;
}
function toggleCatCredito(id){catExpandidaCredito=catExpandidaCredito===id?null:id;renderCreditos();}
</script>
</body>
</html>
